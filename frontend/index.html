<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Distributed Task Queue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }

    header h1 span {
      color: #7c6af7;
    }

    #live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Metric Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
    }

    .card .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 32px;
      font-weight: 700;
    }

    .card.pending  .value { color: #f59e0b; }
    .card.running  .value { color: #3b82f6; }
    .card.success  .value { color: #22c55e; }
    .card.failed   .value { color: #ef4444; }
    .card.retrying .value { color: #a78bfa; }
    .card.dead     .value { color: #6b7280; }
    .card.queue    .value { color: #7c6af7; }
    .card.total    .value { color: #ffffff; }

    /* ── Submit Form ── */
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 14px;
    }

    .form-box {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 100px 100px auto;
      gap: 12px;
      align-items: end;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }

    label { font-size: 12px; color: #888; }

    select, input, textarea {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    select:focus, input:focus, textarea:focus {
      border-color: #7c6af7;
    }

    textarea { resize: vertical; min-height: 38px; font-family: monospace; }

    button {
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #6355d4; }
    button:disabled { background: #444; cursor: not-allowed; }

    #submit-msg {
      margin-top: 10px;
      font-size: 13px;
      min-height: 20px;
    }

    .success-msg { color: #22c55e; }
    .error-msg   { color: #ef4444; }

    /* ── Task Table ── */
    .table-box {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2d3a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: #13151f;
      padding: 10px 16px;
      text-align: left;
      color: #888;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    tbody tr {
      border-bottom: 1px solid #1f2230;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #1f2230; }

    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    .task-id {
      font-family: monospace;
      font-size: 11px;
      color: #888;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.PENDING  { background: #78350f22; color: #f59e0b; border: 1px solid #f59e0b44; }
    .badge.RUNNING  { background: #1e3a5f22; color: #3b82f6; border: 1px solid #3b82f644; }
    .badge.SUCCESS  { background: #14532d22; color: #22c55e; border: 1px solid #22c55e44; }
    .badge.FAILED   { background: #7f1d1d22; color: #ef4444; border: 1px solid #ef444444; }
    .badge.RETRYING { background: #4c1d9522; color: #a78bfa; border: 1px solid #a78bfa44; }
    .badge.DEAD     { background: #1f293722; color: #6b7280; border: 1px solid #6b728044; }

    .priority-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .priority-fill {
      height: 6px;
      border-radius: 3px;
      background: #7c6af7;
      transition: width 0.3s;
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: #555;
    }

    #last-updated {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <h1>Task <span>Queue</span> Dashboard</h1>
  <div id="live-badge">
    <div class="dot"></div>
    <span>Live — refreshes every 3s</span>
  </div>
</header>

<!-- Metric Cards -->
<div class="cards">
  <div class="card queue">
    <div class="label">In Queue</div>
    <div class="value" id="m-queue">—</div>
  </div>
  <div class="card pending">
    <div class="label">Pending</div>
    <div class="value" id="m-pending">—</div>
  </div>
  <div class="card running">
    <div class="label">Running</div>
    <div class="value" id="m-running">—</div>
  </div>
  <div class="card success">
    <div class="label">Success</div>
    <div class="value" id="m-success">—</div>
  </div>
  <div class="card retrying">
    <div class="label">Retrying</div>
    <div class="value" id="m-retrying">—</div>
  </div>
  <div class="card failed">
    <div class="label">Failed</div>
    <div class="value" id="m-failed">—</div>
  </div>
  <div class="card dead">
    <div class="label">Dead Letter</div>
    <div class="value" id="m-dead">—</div>
  </div>
  <div class="card total">
    <div class="label">Total</div>
    <div class="value" id="m-total">—</div>
  </div>
</div>

<!-- Submit Task Form -->
<div class="form-box">
  <div class="section-title">Submit New Task</div>
  <div class="form-grid">
    <div class="form-group">
      <label>Task Type</label>
      <select id="task-type">
        <option value="send_email">send_email</option>
        <option value="generate_report">generate_report</option>
        <option value="process_data">process_data</option>
        <option value="send_sms">send_sms</option>
        <option value="unknown_task">unknown_task (triggers dead letter)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Payload (JSON)</label>
      <textarea id="payload">{"to": "user@gmail.com", "subject": "Hello"}</textarea>
    </div>
    <div class="form-group">
      <label>Priority (1-10)</label>
      <input type="number" id="priority" value="5" min="1" max="10"/>
    </div>
    <div class="form-group">
      <label>Max Retries</label>
      <input type="number" id="max-retries" value="3" min="0" max="10"/>
    </div>
    <div class="form-group">
      <label>&nbsp;</label>
      <button id="submit-btn" onclick="submitTask()">Submit</button>
    </div>
  </div>
  <div id="submit-msg"></div>
</div>

<!-- Task Table -->
<div class="table-box">
  <div class="table-header">
    <div class="section-title" style="margin:0">Recent Tasks</div>
    <div id="last-updated">—</div>
  </div>
  <table>
    <thead>
      <tr>
        <th>Task ID</th>
        <th>Type</th>
        <th>View</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Retries</th>
        <th>Created</th>
        <th>Duration</th>
      </tr>
    </thead>
    <tbody id="task-tbody">
      <tr><td colspan="7" class="empty-state">Loading tasks...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const API = 'http://127.0.0.1:8000';

  // ── Fetch Metrics ──────────────────────────────────────────
  async function fetchMetrics() {
    try {
      const res = await fetch(`${API}/metrics/`);
      const data = await res.json();
      document.getElementById('m-queue').textContent    = data.queue_depth ?? 0;
      document.getElementById('m-pending').textContent  = data.pending ?? 0;
      document.getElementById('m-running').textContent  = data.running ?? 0;
      document.getElementById('m-success').textContent  = data.success ?? 0;
      document.getElementById('m-retrying').textContent = data.retrying ?? 0;
      document.getElementById('m-failed').textContent   = data.failed ?? 0;
      document.getElementById('m-dead').textContent     = data.dead ?? 0;
      document.getElementById('m-total').textContent    = data.total ?? 0;
    } catch (e) {
      console.error('Metrics fetch failed', e);
    }
  }

  // ── Fetch Tasks ────────────────────────────────────────────
  async function fetchTasks() {
    try {
      const res = await fetch(`${API}/tasks/?limit=20`);
      const tasks = await res.json();
      const tbody = document.getElementById('task-tbody');

      if (!tasks.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No tasks yet. Submit one above!</td></tr>`;
        return;
      }

      tbody.innerHTML = tasks.map(t => {
        const duration = getDuration(t.started_at, t.completed_at);
        const created  = formatDate(t.created_at);
        const priority = t.priority ?? 5;

      return `
          <tr onclick="showDetail('${t.task_id}')" style="cursor:pointer">
            <td class="task-id">${t.task_id.slice(0, 8)}...</td>
            <td>${t.task_type}</td>
            <td>
              <button onclick="event.stopPropagation(); showDetail('${t.task_id}')" style="
                background:transparent; border:1px solid #2a2d3a;
                border-radius:8px; padding:4px 10px;
                color:#7c6af7; cursor:pointer; font-size:16px;">
                👁
              </button>
            </td>
            <td><span class="badge ${t.status}">${t.status}</span></td>
            <td>
              <div class="priority-bar">
                <div class="priority-fill" style="width:${priority * 10}px"></div>
                <span>${priority}</span>
              </div>
            </td>
            <td>${t.retry_count}/${t.max_retries}</td>
            <td>${created}</td>
            <td>${duration}</td>
          </tr>`;
      }).join('');

      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      console.error('Tasks fetch failed', e);
    }
  }

  // ── Submit Task ────────────────────────────────────────────
  async function submitTask() {
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('submit-msg');
    btn.disabled = true;
    msg.textContent = '';

    let payload;
    try {
      payload = JSON.parse(document.getElementById('payload').value);
    } catch {
      msg.textContent = '❌ Invalid JSON in payload field';
      msg.className = 'error-msg';
      btn.disabled = false;
      return;
    }

    const body = {
      task_type:   document.getElementById('task-type').value,
      payload:     payload,
      priority:    parseInt(document.getElementById('priority').value),
      max_retries: parseInt(document.getElementById('max-retries').value),
    };

    try {
      const res = await fetch(`${API}/tasks/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        const data = await res.json();
        msg.textContent = `✅ Task submitted! ID: ${data.task_id.slice(0, 8)}...`;
        msg.className = 'success-msg';
        fetchTasks();
        fetchMetrics();
      } else {
        msg.textContent = '❌ Submission failed. Check API logs.';
        msg.className = 'error-msg';
      }
    } catch (e) {
      msg.textContent = '❌ Could not reach API. Is the server running?';
      msg.className = 'error-msg';
    }

    btn.disabled = false;
  }

  // ── Helpers ────────────────────────────────────────────────
  function getDuration(start, end) {
    if (!start) return '—';
    const s = new Date(start);
    const e = end ? new Date(end) : new Date();
    const diff = Math.round((e - s) / 1000);
    return diff < 60 ? `${diff}s` : `${Math.round(diff/60)}m`;
  }

  function formatDate(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleTimeString();
  }

  // ── Auto Refresh ───────────────────────────────────────────
  async function refresh() {
    await Promise.all([fetchMetrics(), fetchTasks()]);
  }

  refresh();
  setInterval(refresh, 3000);
</script>
<!-- Task Detail Modal -->
<div id="modal-overlay" onclick="closeModal()" style="
  display:none; position:fixed; inset:0;
  background:#000000aa; z-index:100;
  align-items:center; justify-content:center;">

  <div onclick="event.stopPropagation()" style="
    background:#1a1d27; border:1px solid #2a2d3a;
    border-radius:16px; padding:28px; width:580px;
    max-width:95vw; max-height:85vh; overflow-y:auto;
    position:relative;">

    <button onclick="closeModal()" style="
      position:absolute; top:16px; right:16px;
      background:#2a2d3a; border:none; color:#aaa;
      border-radius:8px; padding:4px 12px;
      font-size:18px; cursor:pointer;">✕</button>

    <h2 style="font-size:18px; margin-bottom:20px; color:#fff">Task Details</h2>

    <div id="modal-content">Loading...</div>
  </div>
</div>

<script>
  async function showDetail(taskId) {
    // Show modal immediately with loading state
    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
    document.getElementById('modal-content').innerHTML = `
      <div style="text-align:center; color:#888; padding:32px">Loading...</div>`;

    try {
      const res = await fetch(`${API}/tasks/${taskId}`);
      const t = await res.json();

      const statusColors = {
        PENDING: '#f59e0b', RUNNING: '#3b82f6', SUCCESS: '#22c55e',
        FAILED: '#ef4444', RETRYING: '#a78bfa', DEAD: '#6b7280'
      };

      const color = statusColors[t.status] || '#888';

      document.getElementById('modal-content').innerHTML = `
        <div style="display:grid; gap:14px;">

          ${row('Task ID', `<span style="font-family:monospace;font-size:12px">${t.task_id}</span>`)}
          ${row('Type', t.task_type)}
          ${row('Status', `<span class="badge ${t.status}">${t.status}</span>`)}
          ${row('Priority', `${t.priority} / 10`)}
          ${row('Retries', `${t.retry_count} of ${t.max_retries}`)}
          ${row('Created', formatFull(t.created_at))}
          ${row('Started', formatFull(t.started_at))}
          ${row('Completed', formatFull(t.completed_at))}
          ${row('Duration', getDuration(t.started_at, t.completed_at))}

          <div style="border-top:1px solid #2a2d3a; padding-top:14px">
            <div style="font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase">Payload</div>
            <pre style="background:#0f1117;border-radius:8px;padding:12px;font-size:12px;
              color:#a78bfa;overflow-x:auto">${JSON.stringify(t.payload, null, 2)}</pre>
          </div>

          ${t.result ? `
          <div>
            <div style="font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase">Result</div>
            <pre style="background:#0f1117;border-radius:8px;padding:12px;font-size:12px;
              color:#22c55e;overflow-x:auto">${JSON.stringify(t.result, null, 2)}</pre>
          </div>` : ''}

          ${t.error ? `
          <div>
            <div style="font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase">Error</div>
            <pre style="background:#0f1117;border-radius:8px;padding:12px;font-size:12px;
              color:#ef4444;overflow-x:auto">${t.error}</pre>
          </div>` : ''}

        </div>`;
    } catch(e) {
      document.getElementById('modal-content').innerHTML =
        `<div style="color:#ef4444">Failed to load task details.</div>`;
    }
  }

  function row(label, value) {
    return `
      <div style="display:flex; justify-content:space-between; align-items:center;
        padding:8px 0; border-bottom:1px solid #1f2230">
        <span style="font-size:12px;color:#888;text-transform:uppercase">${label}</span>
        <span style="font-size:13px;color:#e0e0e0">${value ?? '—'}</span>
      </div>`;
  }

  function formatFull(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleString();
  }

  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  // Close on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
